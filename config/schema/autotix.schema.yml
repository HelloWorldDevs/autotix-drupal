autotix.settings:
  type: config_object
  label: 'Autotix settings'
  mapping:
    enabled:
      type: boolean
      label: 'Enabled'
    auth_method:
      type: string
      label: 'Authentication method'
    auth_token_key:
      type: string
      label: 'Auth token Key entity ID'
    auth_secret_key:
      type: string
      label: 'HMAC secret Key entity ID'
    send_immediately:
      type: boolean
      label: 'Send errors immediately'
    severity_threshold:
      type: integer
      label: 'Severity threshold'
    environment:
      type: string
      label: 'Environment name'
    dedup_window:
      type: integer
      label: 'Deduplication window (seconds)'
    include_backtrace:
      type: boolean
      label: 'Include backtrace'
    debug:
      type: boolean
      label: 'Debug logging'
    timeout:
      type: integer
      label: 'HTTP timeout (seconds)'
